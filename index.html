<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Escape Room Catalogue</title>

<style>

body{
    font-family:Arial;
    margin:20px;
}

table{
    border-collapse:collapse;
    width:100%;
}

th,td{
    border:1px solid #ccc;
    padding:6px;
}

th{
    background:#eee;
}

.controls{
    margin-bottom:15px;
}

</style>
</head>

<body>

<h2>전국 방탈출 테마</h2>

<div class="controls">

별점 ≥
<input id="starFilter" type="number" step="0.1">

난이도 ≥
<input id="diffFilter" type="number">

<button onclick="applyFilter()">필터</button>

<button onclick="sortStar(true)">별점↑</button>
<button onclick="sortStar(false)">별점↓</button>

<button onclick="sortDiff(true)">난이도↑</button>
<button onclick="sortDiff(false)">난이도↓</button>

</div>

<table id="table">

<thead>
<tr>
<th>매장</th>
<th>테마</th>
<th>별점</th>
<th>난이도</th>
<th>리뷰</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

let data = [];

async function loadData(){

const url = "https://api.allorigins.win/raw?url=https://colory.mooo.com/bba/catalogue";

const res = await fetch(url);
const html = await res.text();

const parser = new DOMParser();
const doc = parser.parseFromString(html,"text/html");

const rows = doc.querySelectorAll(".themes-info tbody tr");

let lastStore = "";

rows.forEach(row=>{

const cells = row.querySelectorAll("td");

let store, theme, star, diff, review;

if(cells.length===5){

store = cells[0].innerText;
theme = cells[1].innerText;
star = parseFloat(cells[2].innerText);
diff = parseInt(cells[3].innerText);
review = parseInt(cells[4].innerText);

lastStore = store;

}else{

store = lastStore;
theme = cells[0].innerText;
star = parseFloat(cells[1].innerText);
diff = parseInt(cells[2].innerText);
review = parseInt(cells[3].innerText);

}

data.push({store,theme,star,diff,review});

});

render(data);

}

function render(list){

const tbody = document.querySelector("#table tbody");

tbody.innerHTML="";

list.forEach(d=>{

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${d.store}</td>
<td>${d.theme}</td>
<td>${d.star}</td>
<td>${d.diff}</td>
<td>${d.review}</td>
`;

tbody.appendChild(tr);

});

}

function applyFilter(){

const starMin = parseFloat(document.getElementById("starFilter").value)||0;
const diffMin = parseInt(document.getElementById("diffFilter").value)||0;

const filtered = data.filter(d=>
d.star>=starMin && d.diff>=diffMin
);

render(filtered);

}

function sortStar(asc){

const sorted=[...data].sort((a,b)=> asc ? a.star-b.star : b.star-a.star);

render(sorted);

}

function sortDiff(asc){

const sorted=[...data].sort((a,b)=> asc ? a.diff-b.diff : b.diff-a.diff);

render(sorted);

}

loadData();

</script>

</body>
</html>
